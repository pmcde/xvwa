      # When using the aws-actions/configure-aws-credentials action uncomment use_aws_creds_action and aws_region
      # Configure GitHub org level or repo level env vars to set these values
      #use_aws_creds_action: ${{ vars.CONTRAST_CI_USE_AWS_CREDS_ACTION || 'true' }}
      #aws_region:       ${{ vars.AWS_REGION || '' }}

    secrets:
      # -------------------------------------------------------
      # REQUIRED (Contrast values set by Contrast GitHub App at onboard)
      # -------------------------------------------------------
      CONTRAST_API_KEY:           ${{ secrets.CONTRAST_CI_API_KEY }}
      CONTRAST_AUTHORIZATION:     ${{ secrets.CONTRAST_CI_AUTHORIZATION }}
      GH_TOKEN:                   ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # OPTIONAL — BYOLLM
      # If using your own LLM provider, set the relevant API keys in your
      # GitHub organization level or repo level secrets.
      # -------------------------------------------------------
      ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
      AZURE_API_KEY:            ${{ secrets.AZURE_API_KEY }}
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
      AWS_ROLE_TO_ASSUME:       ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:        ${{ secrets.AWS_SESSION_TOKEN }}
