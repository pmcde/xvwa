  call-contrast-orchestrator:
    if: ${{ github.actor != 'dependabot[bot]' }}
    name: Contrast CI
    uses: Contrast-Security-OSS/contrast-ci/.github/workflows/contrast-orchestrator.yml@main
    with:
      # -------------------------------------------------------
      # CONTRAST PLATFORM CONFIG (set by Contrast GitHub App at onboard)
      # -------------------------------------------------------
      api_host:                   ${{ vars.CONTRAST_CI_API_HOST }}
      contrast_org_id:            ${{ vars.CONTRAST_CI_ORG_ID }}

      # -------------------------------------------------------
      # REPO CONTEXT (auto-populated, do not edit)
      # -------------------------------------------------------
      base_branch: ${{ github.event.repository.default_branch }}
      repo_url:    ${{ github.server_url }}
      repo_name:   ${{ github.repository }}

      # -------------------------------------------------------
      # RUNNER (optional override)
      # Configure GitHub org level or repo level env var to set this value without editing the workflow file.
      # -------------------------------------------------------
      github_runner: ${{ vars.CONTRAST_CI_GITHUB_RUNNER || 'ubuntu-latest' }}

      # -------------------------------------------------------
      # SmartFix Config (manual optional overrides)
      # Configure GitHub org level or repo level env vars to set these values without editing the workflow file.
      # -------------------------------------------------------
      max_open_prs: ${{ vars.CONTRAST_CI_MAX_PRS || '5' }}
      enable_full_telemetry: ${{ vars.CONTRAST_CI_ENABLE_FULL_TELEMETRY || 'true' }}
      debug_mode: ${{ vars.CONTRAST_CI_DEBUG_MODE || 'false' }}
      # Coding Agent Options: 'SMARTFIX', 'GITHUB_COPILOT', 'CLAUDE_CODE' see SmartFix docs for details on differences and requirements for each agent.
      coding_agent: ${{ vars.CONTRAST_CI_CODING_AGENT || 'SMARTFIX' }}
      #contrast_app_id: ${{ vars.CONTRAST_APP_ID  }}
      #build_command: ${{ vars.BUILD_COMMAND || '' }}
      #formatting_command: ${{ vars.FORMATTING_COMMAND || '' }}

      # -------------------------------------------------------
      # Contrast Code Config (manual optional overrides)
      # Configure GitHub org level or repo level env var to extend or shorten the default triage duration of 10 minutes
      # -------------------------------------------------------
      triage_duration: ${{ vars.CONTRAST_CI_TRIAGE_DURATION || '10m' }}

      # -------------------------------------------------------
